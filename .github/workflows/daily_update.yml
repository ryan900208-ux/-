name: Daily Strategy Scan & Update

on:
  schedule:
    # Runs at 10:00 UTC (18:00 Taipei time) every Monday-Friday
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI
    inputs:
      manual_sell:
        description: 'Force manual exit for stock (e.g. 3006.TW)'
        required: false
        default: ''

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows pushing updated data back to repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance starlette uvicorn openpyxl

      - name: Run Daily Update Script
        env:
          MANUAL_SELL: ${{ github.event.inputs.manual_sell }}
        run: |
          python run_daily_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add modified database and output files
          git add docs/outputs/paper_trading/state.json
          git add docs/outputs/paper_trading/daily_snapshots.csv
          git add docs/outputs/paper_trading/dashboard.json
          git add docs/outputs/paper_trading/holdings_history.json
          git add docs/outputs/paper_trading/signals/
          git add work/price_cache/
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): auto daily strategy update [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "No portfolio changes detected."
          fi
